name: Release Foundry module

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Build Foundry module archive
        run: |
          mkdir -p dist/token-attacher
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude .agents \
            --exclude tests \
            --exclude dist \
            ./ dist/token-attacher/
          cd dist/token-attacher
          zip -r ../token-attacher.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/token-attacher.zip
