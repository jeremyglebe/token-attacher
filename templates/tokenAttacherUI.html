<div id="tokenAttacher" class="flexrow">
    <div class="app image"{{#unless token-video}} style="background-image:url({{token-image}});"{{/unless}}>
        {{#if token-video}}<video src="{{token-image}}" autoplay loop muted playsinline></video>{{/if}}
        <span class="token-name"><span>{{token-name}}</span></span>
    </div>
    <nav class="control-tools flexcol" aria-label="Token Attacher controls">
        <button type="button" class="control-tool select" title="{{localize "TOKENATTACHER.button.select"}}">
            <i class="fas fa-expand"></i>
        </button>
        <button type="button" class="control-tool link" title="{{localize "TOKENATTACHER.button.link"}}">
            <i class="fas fa-link"></i>
        </button>
        <button type="button" class="control-tool unlink" title="{{localize "TOKENATTACHER.button.unlink"}}">
            <i class="fas fa-unlink"></i>
        </button>
        <button type="button" class="control-tool unlink-all" title="{{localize "TOKENATTACHER.button.unlink-all"}}">
            <i class="fa fa-trash"></i>
        </button>
        <button type="button" class="control-tool lock" title="{{localize "TOKENATTACHER.button.lock"}}">
            <i class="fas fa-lock"></i>
        </button>
        <button type="button" class="control-tool unlock" title="{{localize "TOKENATTACHER.button.unlock"}}">
            <i class="fas fa-unlock"></i>
        </button>
        <button type="button" class="control-tool highlight" title="{{localize "TOKENATTACHER.button.highlight"}}">
            <i class="fas fa-sun"></i>
            <i class="far fa-sun hidden"></i>
        </button>
        <button type="button" class="control-tool copy" title="{{localize "TOKENATTACHER.button.copy"}}">
            <i class="fas fa-copy"></i>
        </button>
        <button type="button" class="control-tool paste" title="{{localize "TOKENATTACHER.button.paste"}}">
            <i class="fas fa-paste"></i>
        </button>
        <button type="button" class="control-tool toggle-animate" title="{{localize "TOKENATTACHER.button.toggleAnimate"}}">
            <i class="fas fa-running"></i>
        </button>
    </nav>
    <button type="button" class="control-tool close" title="{{localize "TOKENATTACHER.button.close"}}">
        <i class="fas fa-times-circle"></i>
    </button>
</div>
